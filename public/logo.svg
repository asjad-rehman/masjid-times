<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 460" fill="none">

  <!-- ═══ Book / Wings ═══ -->
  <!-- Left outer wing -->
  <path d="M196,218 C170,205 120,188 70,190 C40,191 12,202 6,218 C2,228 10,238 30,234 C70,226 140,220 196,228 Z" fill="#2b7a6e"/>
  <!-- Left inner wing (depth) -->
  <path d="M196,228 C155,222 100,218 58,224 C38,227 22,233 24,242 C50,237 120,232 196,240 Z" fill="#2b7a6e"/>

  <!-- Right outer wing -->
  <path d="M204,218 C230,205 280,188 330,190 C360,191 388,202 394,218 C398,228 390,238 370,234 C330,226 260,220 204,228 Z" fill="#2b7a6e"/>
  <!-- Right inner wing (depth) -->
  <path d="M204,228 C245,222 300,218 342,224 C362,227 378,233 376,242 C350,237 280,232 204,240 Z" fill="#2b7a6e"/>

  <!-- Centre V spine -->
  <path d="M186,230 L200,250 L214,230 L210,226 L200,244 L190,226 Z" fill="#2b7a6e"/>

  <!-- ═══ Mosque base / drum ═══ -->
  <rect x="162" y="148" width="76" height="28" rx="3" fill="#2b7a6e"/>
  <!-- Decorative band on drum -->
  <rect x="160" y="144" width="80" height="8" rx="3" fill="#2b7a6e"/>

  <!-- ═══ Main dome ═══ -->
  <path d="M163,148 C163,148 148,130 148,108 C148,80 170,54 200,50 C230,54 252,80 252,108 C252,130 237,148 237,148 Z" fill="#2b7a6e"/>
  <!-- Dome highlight arc -->
  <path d="M218,65 C234,78 240,100 236,120" stroke="white" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.25"/>

  <!-- ═══ Finial ═══ -->
  <!-- Pole -->
  <line x1="200" y1="50" x2="200" y2="28" stroke="#2b7a6e" stroke-width="4" stroke-linecap="round"/>

  <!-- Crescent moon -->
  <path d="M200,26 m-8,0 a8,8 0 1,1 16,0 a6,6 0 1,0 -16,0 Z" fill="#2b7a6e"/>

  <!-- Star (5-pointed) above crescent -->
  <polygon points="200,4 201.8,9.5 207.5,9.5 203,13 204.8,18.5 200,15.5 195.2,18.5 197,13 192.5,9.5 198.2,9.5" fill="#2b7a6e"/>

  <!-- ═══ Text ═══ -->
  <text x="200" y="296" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="30" font-weight="700"
    fill="#1a2a28"
    letter-spacing="3">ISLAMIC CENTER</text>

  <text x="200" y="330" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="20"
    fill="#2b7a6e"
    letter-spacing="5">OF HATTIESBURG</text>

</svg>
